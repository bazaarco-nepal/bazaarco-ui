<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" fill="none">
<ellipse cx="44" cy="82" rx="38" ry="3.5" fill="#1B2A6B" opacity="0.08"/>
<defs>
<clipPath id="topiBody">
<path d="M20 44 C20 38 32 35 48 35 C64 35 76 38 76 44 L76 66 C76 73 64 77 48 77 C32 77 20 73 20 66 Z"/>
</clipPath>
