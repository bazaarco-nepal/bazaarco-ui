<!-- ===== Nepal flag on a pole (behind, to the right) ===== -->
<!-- pole -->
<rect x="62.6" y="11" width="2.4" height="64" rx="1.2" fill="#7A5C2E"/>
<rect x="62.6" y="11" width="1" height="64" rx="0.5" fill="#A8854A"/>
<circle cx="63.8" cy="10.5" r="2.2" fill="#C99B3F"/>
<!-- flag body: double pennant, crimson field with blue border -->
<path d="M64 14 L82 22.5 L68 25 L86 36 L64 43 Z" fill="#DC143C" stroke="#003893" stroke-width="2.2" stroke-linejoin="round"/>
<!-- white moon (upper pennant) -->
<g>
<circle cx="69.5" cy="21" r="2.7" fill="#ffffff"/>
<circle cx="70.8" cy="20.4" r="2.1" fill="#DC143C"/>
</g>
<!-- white sun (lower pennant) -->
<g fill="#ffffff">
<circle cx="70" cy="34" r="2.2"/>
<g stroke="#ffffff" stroke-width="1.1" stroke-linecap="round">
<path d="M70 30 L70 27.8"/><path d="M70 38 L70 40.2"/>
<path d="M66 34 L63.8 34"/><path d="M74 34 L76.2 34"/>
<path d="M67.2 31.2 L65.6 29.6"/><path d="M72.8 31.2 L74.4 29.6"/>
<path d="M67.2 36.8 L65.6 38.4"/><path d="M72.8 36.8 L74.4 38.4"/>
</g>
</g>

<!-- ===== Dhaka topi (the Nepali product) ===== -->
