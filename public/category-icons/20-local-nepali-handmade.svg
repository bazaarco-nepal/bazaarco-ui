<g>
<g transform="translate(33,48)"><path d="M0 -7 L7 0 L0 7 L-7 0 Z" fill="#F3B59C"/><path d="M0 -3 L3 0 L0 3 L-3 0 Z" fill="#3A4357"/></g>
