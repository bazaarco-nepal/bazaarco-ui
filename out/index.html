<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>BazaarCo Nepal</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px
          max(24px, env(safe-area-inset-bottom));
        box-sizing: border-box;
        background: #f7f7f5;
        color: #171717;
        font-family: system-ui, sans-serif;
        text-align: center;
      }

      main {
        max-width: 320px;
      }

      .mark {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        margin: 0 auto 24px;
        border: 2px solid #171717;
        border-radius: 8px;
        background: #fff;
        font-size: 22px;
        font-weight: 800;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0;
        color: #555;
        line-height: 1.5;
      }

      button {
        width: 100%;
        min-height: 48px;
        margin-top: 24px;
        border: 0;
        border-radius: 6px;
        background: #171717;
        color: #fff;
        font: inherit;
        font-weight: 750;
      }

      button:active {
        transform: scale(0.98);
      }

      small {
        display: block;
        margin-top: 14px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">B</div>
      <h1>You&apos;re offline</h1>
      <p>BazaarCo needs an internet connection to load products and complete purchases.</p>
      <button id="retry" type="button">Try again</button>
      <small id="status">We&apos;ll reconnect when your network returns.</small>
    </main>
    <script>
      const appUrl = "https://www.bazaarconepal.com";
      const retry = document.getElementById("retry");
      const status = document.getElementById("status");

      function reconnect() {
        retry.disabled = true;
        retry.textContent = "Connecting...";
        status.textContent = "Checking your connection.";
        window.location.replace(appUrl);
      }

      retry.addEventListener("click", reconnect);
      window.addEventListener("online", reconnect);
    </script>
  </body>
</html>
