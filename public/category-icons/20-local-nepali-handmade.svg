<path d="M0 60 L40 20"/><path d="M12 72 L52 32"/><path d="M24 84 L64 44"/>
<path d="M36 96 L76 56"/><path d="M48 96 L88 56"/><path d="M60 96 L96 60"/>
<path d="M-4 48 L28 16"/>
